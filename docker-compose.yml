services:
  app:
    build: .
    container_name: caplora_backend
    restart: unless-stopped
    ports:
      - "8080:8080"
    environment:
      - PORT=8080
      - DB_HOST=db
      - DB_PORT=3306
      - DB_USER=caplora
      - DB_PASSWORD=caplora_pass
      - DB_NAME=caplora2
    volumes:
      - uploads_data:/app/uploads
    depends_on:
      db:
        condition: service_healthy

  db:
    image: mysql:8.0
    container_name: caplora_db
    restart: unless-stopped
    environment:
      - MYSQL_DATABASE=caplora2
      - MYSQL_USER=caplora
      - MYSQL_PASSWORD=caplora_pass
      - MYSQL_ROOT_PASSWORD=root_pass_change_me
    volumes:
      - mysql_data:/var/lib/mysql
    ports:
      - "3306:3306"
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "caplora", "-pcaplora_pass"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  mysql_data:
  uploads_data:
